name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm ci --prefix server
      - run: npm run build
      - run: npm run build:server-release
      - run: npm run test:ci
      - run: npm --prefix server run typecheck

      # Sanity check: the tag must match manifest.json version
      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag ($TAG) does not match manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          zip yaos.zip main.js manifest.json styles.css
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              yaos.zip \
              dist/release-assets/yaos-server.zip \
              dist/release-assets/update-manifest.json \
              main.js \
              manifest.json \
              styles.css \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              yaos.zip \
              dist/release-assets/yaos-server.zip \
              dist/release-assets/update-manifest.json \
              main.js \
              manifest.json \
              styles.css
          fi
